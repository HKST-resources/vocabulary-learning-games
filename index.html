<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>詞彙學習活動</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="show-text">

    <header class="top-bar">
        <div class="left-nav">
            <button id="nav-btn-sort" class="pill-btn btn-blue">分類遊戲</button>
            <button class="pill-btn btn-orange">擴展性命名</button>
            <button class="pill-btn btn-grey">快速命名</button>
        </div>
        
        <div class="right-controls">
            <div class="ctrl-group">
                <span class="label-text">大小</span>
                <input type="range" id="sizeSlider" min="80" max="250" value="120">
            </div>
            <label class="ctrl-group">
                <input type="checkbox" id="textToggle" checked> 顯示文字
            </label>
            <select id="bgSelect" class="ctrl-group nav-height-sync">
                <option value="park.jpg" selected>公園</option>
                <option value="room.jpg">房間</option>
                <option value="road.jpg">馬路</option>
                <option value="game.jpg">遊戲</option>
                <option value="yellow.jpg">黃色</option>
                <option value="stripe.jpg">條紋</option>
                <option value="white">白色</option>
            </select>
            <button id="exportBtn" class="pill-btn btn-export">
                <i class="fa-solid fa-floppy-disk"></i> 匯出 💾
            </button>
        </div>
    </header>

    <main id="main-stage">
        <div id="welcome-msg" class="center-msg">
            <h2>請選擇上方活動開始</h2>
        </div>
    </main>

    <button id="global-next-btn" class="pill-btn btn-muted-green next-step-btn hidden">
        下一步 (已選: 0) <i class="fa-solid fa-arrow-right"></i>
    </button>

    <script src="script.js"></script>
</body>
</html>
