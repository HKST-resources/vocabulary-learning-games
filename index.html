<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>詞彙學習活動</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>

    <div id="bg-layer">
        <video id="bg-video" loop muted playsinline style="display:none;"></video>
    </div>

    <nav class="sidebar">
        <h1>詞彙學習活動</h1>
        <hr>
        <div class="menu-section">
            <button onclick="initGame('sorting')">1. 分類遊戲</button>
            <button onclick="initGame('naming')">2. 擴展性命名</button>
            <button onclick="initGame('ran')">3. 快速命名</button>
        </div>
        <hr>
        <div class="settings-section">
            <h3>控制面板</h3>
            <label>卡片大小: <input type="range" id="sizeSlider" min="100" max="450" value="200"></label>
            <label>顯示文字: <input type="checkbox" id="textToggle" checked></label>
            <label>背景:
                <select id="bgPicker">
                    <option value="white">純白</option>
                    <option value="theme">公園主題</option>
                    <option value="video">動態干擾</option>
                </select>
            </label>
            <button class="export-btn" onclick="takeScreenshot()">📸 匯出練習紙或結果</button>
        </div>
    </nav>

    <main id="capture-area">
        <div id="game-header">
            <h2 id="current-game-title">請選擇活動</h2>
        </div>
        
        <div id="game-stage">
            <div class="welcome-screen">
                <p>歡迎進入詞彙學習活動</p>
                <p>請從左側選單開始</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
