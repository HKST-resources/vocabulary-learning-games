<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>詞彙學習活動</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="bg-grass">

    <header class="top-bar">
        <div class="left-nav">
            <button id="nav-btn-sort" class="pill-btn btn-blue">分類</button>
            <button class="pill-btn btn-orange">擴展性命名</button>
            <button class="pill-btn btn-grey">快速命名</button>
        </div>
        
        <div class="right-controls">
            <div class="ctrl-group">
                <span>大小</span>
                <input type="range" id="sizeSlider" min="80" max="250" value="150">
            </div>
            <label class="ctrl-group">
                <input type="checkbox" id="textToggle" checked> 顯示文字
            </label>
            <select id="bgSelect" class="ctrl-group">
                <option value="park.jpg">草地</option>
                <option value="white">白色</option>
            </select>
            <button id="exportBtn" class="pill-btn btn-green">
                <i class="fa-solid fa-floppy-disk"></i> 匯出
            </button>
        </div>
    </header>

    <main id="main-stage">
        <div id="welcome-msg" class="center-msg">
            <h2>請選擇上方活動開始</h2>
        </div>
    </main>

    <button id="global-next-btn" class="pill-btn btn-green next-step-btn hidden">
        下一步 (已選: 0) <i class="fa-solid fa-arrow-right"></i>
    </button>

    <script src="script.js"></script>
</body>
</html>
