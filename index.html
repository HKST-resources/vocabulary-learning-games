<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>詞彙學習遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --card-width: 110px; 
            --card-font-size: 1.1rem;
            --blue-dark: #0EA5E9; 
            --orange-dark: #EA580C;
            --pink-main: #FB6764;
            --blue-main: #4BD8F8;
        }
        body { font-family: "PingFang HK", "Heiti TC", sans-serif; overflow-x: hidden; user-select: none; -webkit-user-select: none; }
        
        .bg-park { background: url('images/park.jpg') center/cover fixed; }
        .bg-room { background: url('images/room.jpg') center/cover fixed; }
        .bg-road { background: url('images/road.jpg') center/cover fixed; }
        .bg-game { background: url('images/game.jpg') center/cover fixed; }
        .bg-white { background-color: #ffffff; }

        .btn-blue { background-color: var(--blue-dark); border-bottom: 5px solid #0369a1; color: white; }
        .btn-orange { background-color: var(--orange-dark); border-bottom: 5px solid #9a3412; color: white; }
        .btn-emerald { background-color: #059669; border-bottom: 5px solid #064e3b; color: white; }
        .btn-gray { background-color: #6b7280; border-bottom: 5px solid #374151; color: white; }
        .btn-active:active { transform: translateY(2px); border-bottom-width: 2px; }

        .vocab-card {
            width: var(--card-width);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            touch-action: none; /* Prevents iPad scroll during drag */
            position: relative;
        }
        
        /* Dragging visuals */
        .dragging {
            position: fixed !important;
            z-index: 1000 !important;
            pointer-events: none;
            opacity: 0.8;
            transform: scale(1.1);
        }

        .vocab-card p { font-size: var(--card-font-size); font-weight: 400; text-align: center; margin-top: 4px; }
        .selected-card { outline: 6px solid #22c55e; box-shadow: 0 0 20px rgba(34, 197, 94, 0.5); }

        .hide-text p { display: none !important; }
        .hide-text .vocab-card { height: var(--card-width); justify-content: center; }

        .cat-box { display: flex; flex-direction: column; border-radius: 24px; overflow: hidden; background: white; border-width: 6px; height: 100%; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .cat-header { padding: 10px 15px; color: white; font-weight: 900; display: flex; align-items: center; gap: 10px; }
        
        .theme-pink { border-color: #FB6764; } .theme-pink .cat-header { background-color: #FB6764; }
        .theme-blue { border-color: #4BD8F8; } .theme-blue .cat-header { background-color: #4BD8F8; }
        .theme-green { border-color: #4ad395; } .theme-green .cat-header { background-color: #4ad395; }
        .theme-orange { border-color: #fb923c; } .theme-orange .cat-header { background-color: #fb923c; }

        .feedback-pop {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            font-size: 3rem; z-index: 50; pointer-events: none;
            animation: popUp 0.8s ease-out forwards;
        }
        @keyframes popUp {
            0% { transform: translate(-50%, 10px) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -20px) scale(1.3); opacity: 1; }
            100% { transform: translate(-50%, -40px) scale(1); opacity: 0; }
        }

        .game-viewport { height: calc(100vh - 120px); display: flex; flex-direction: column; gap: 0.5rem; }
    </style>
</head>
<body class="bg-park">

    <nav class="fixed top-0 left-0 w-full h-14 bg-white shadow-sm z-[100] flex items-center justify-between px-4">
        <div class="flex gap-2">
            <button onclick="showSubModes()" class="px-5 py-1 rounded-xl font-bold btn-blue btn-active">分類遊戲</button>
        </div>

        <div class="flex items-center gap-4 text-sm font-bold text-gray-700">
            <div class="flex items-center gap-2">
                <span>大小</span>
                <input type="range" id="sizeSlider" min="80" max="220" value="110" oninput="handleSizeChange(this.value)">
            </div>
            <label class="flex items-center gap-1 cursor-pointer">
                <input type="checkbox" id="showTextToggle" checked onchange="handleTextToggle(this.checked)"> 顯示文字
            </label>
            <select onchange="document.body.className = 'bg-' + this.value" class="border rounded-md px-2 py-1 bg-gray-50">
                <option value="park">草地</option><option value="room">房間</option><option value="road">馬路</option><option value="game">遊戲</option><option value="white">純白</option>
            </select>
            <button onclick="exportResult()" class="px-4 py-1 bg-emerald-600 text-white rounded-md font-bold btn-active shadow-md">匯出 💾</button>
        </div>
    </nav>

    <main id="app" class="mt-16 p-4"></main>

    <script>
        /* Asset List (Shortened as requested) */
        const bulkVocabData = `
水果 哈密瓜 水果/哈密瓜.png
水果 士多啤梨 水果/士多啤梨.png
水果 奇異果 水果/奇異果.png
蔬菜 粟米 蔬菜/粟米.png
蔬菜 紅椒 蔬菜/紅椒.png
蔬菜 白菜 蔬菜/白菜.png
動物 狗 動物/狗.png
動物 貓 動物/貓.png
`; 

        const vocabList = bulkVocabData.trim().split('\n').map(line => {
            const [cat, name, path] = line.trim().split(/\s+/);
            return { cat, name, path: `images/${path}`, id: 'v-' + Math.random().toString(36).substr(2, 9) };
        });

        const categories = [...new Set(vocabList.map(item => item.cat))];
        const themeClasses = ['theme-pink', 'theme-blue', 'theme-green', 'theme-orange'];

        let view = 'WELCOME';
        let gameMode = ''; 
        let selectedItems = [];
        const sounds = { star: new Audio('sounds/star.mp3'), wrong: new Audio('sounds/wrong.mp3'), hooray: new Audio('sounds/hooray.mp3') };

        function setView(v, mode) { 
            view = v; 
            if(mode) gameMode = mode; 
            updateView(); 
        }

        function showSubModes() { selectedItems = []; view = 'SUB_MODES'; updateView(); }

        function updateView() {
            const app = document.getElementById('app');
            const isTextHidden = !document.getElementById('showTextToggle').checked;
            app.className = "mt-16 p-4 " + (isTextHidden ? "hide-text" : "");
            
            if (view === 'WELCOME') {
                app.innerHTML = `<div class="flex h-[70vh] items-center justify-center text-3xl text-gray-400 font-bold">請選擇上方活動開始</div>`;
            } else if (view === 'SUB_MODES') {
                app.innerHTML = `
                <div class="flex flex-col items-center justify-center gap-12 py-20">
                    <div class="flex gap-10">
                        <button onclick="setView('SELECT', 'ordered')" class="w-72 h-40 text-white text-4xl font-black rounded-3xl btn-blue btn-active">按類別分類</button>
                        <button onclick="setView('SELECT', 'free')" class="w-72 h-40 text-white text-4xl font-black rounded-3xl btn-orange btn-active">自由分類</button>
                    </div>
                </div>`;
            }
            else if (view === 'SELECT') { renderSelection(app); }
            else if (view === 'PREP') { renderPrepBoard(app); }
            else if (view === 'GAME') { renderGameStage(app); }
        }

        // --- Fix 1: Selection Logic (No Full Refresh) ---
        function renderSelection(app) {
            app.innerHTML = `
                <div class="sticky top-14 z-40 bg-white/90 p-4 rounded-2xl mb-6 shadow-sm flex justify-between items-center border border-gray-200">
                    <div class="flex gap-4">
                        <select onchange="document.getElementById('section-'+this.value).scrollIntoView({behavior: 'smooth'})" class="p-2 border-2 border-gray-200 rounded-xl font-bold bg-white">
                            <option>跳至類別...</option>
                            ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                        </select>
                        <input type="text" id="searchInput" placeholder="🔍 搜尋..." class="p-2 border-2 border-gray-200 rounded-xl w-64" oninput="filterGrid(this.value)">
                    </div>
                    <button id="nextBtn" onclick="goNextFromSelect()" class="px-8 py-3 btn-orange btn-active rounded-full font-black text-xl">下一步：已選取 ${selectedItems.length} 張</button>
                </div>
                <div id="selection-grid-container">
                    ${renderGridContent('')}
                </div>
                <button onclick="setView('SUB_MODES')" class="mt-8 px-10 py-2 btn-gray btn-active rounded-full font-bold">返回</button>
            `;
        }

        function filterGrid(term) {
            document.getElementById('selection-grid-container').innerHTML = renderGridContent(term);
        }

        function renderGridContent(term) {
            let html = '';
            const filteredList = term ? vocabList.filter(v => v.name.includes(term)) : vocabList;
            categories.forEach(cat => {
                const items = filteredList.filter(v => v.cat === cat);
                if(items.length === 0) return;
                html += `
                <div id="section-${cat}" class="mb-8">
                    <div class="bg-orange-600 text-white px-6 py-2 rounded-t-xl flex justify-between items-center">
                        <span class="text-xl font-black">${cat}</span>
                        <button onclick="selectAllInCat('${cat}')" class="text-sm bg-white/20 px-4 py-1 rounded-full font-bold">全選</button>
                    </div>
                    <div class="bg-white/40 p-5 rounded-b-xl flex flex-wrap gap-4 border-x border-b border-orange-200">
                        ${items.map(v => {
                            const active = selectedItems.some(i => i.id === v.id) ? 'selected-card' : '';
                            return `<div id="card-${v.id}" onclick="toggleItem('${v.id}')" class="vocab-card cursor-pointer ${active}"><img src="${v.path}" class="w-full pointer-events-none"><p>${v.name}</p></div>`;
                        }).join('')}
                    </div>
                </div>`;
            });
            return html;
        }

        function toggleItem(id) {
            const idx = selectedItems.findIndex(i => i.id === id);
            const cardEl = document.getElementById(`card-${id}`);
            if (idx > -1) {
                selectedItems.splice(idx, 1);
                if(cardEl) cardEl.classList.remove('selected-card');
            } else {
                selectedItems.push(vocabList.find(v => v.id === id));
                if(cardEl) cardEl.classList.add('selected-card');
            }
            document.getElementById('nextBtn').innerText = `下一步：已選取 ${selectedItems.length} 張`;
        }

        function selectAllInCat(cat) {
            vocabList.filter(v => v.cat === cat).forEach(i => {
                if(!selectedItems.some(s=>s.id===i.id)) {
                    selectedItems.push(i);
                    const el = document.getElementById(`card-${i.id}`);
                    if(el) el.classList.add('selected-card');
                }
            });
            document.getElementById('nextBtn').innerText = `下一步：已選取 ${selectedItems.length} 張`;
        }

        function renderPrepBoard(app) {
            const activeCats = [...new Set(selectedItems.map(i => i.cat))];
            app.innerHTML = `
                <div class="flex flex-col items-center gap-6">
                    <button onclick="setView('SELECT')" class="px-8 py-2 btn-gray btn-active rounded-xl font-bold self-start">← 返回修改</button>
                    <div class="flex flex-wrap justify-center gap-8 w-full px-4">
                        ${activeCats.map((cat, idx) => `
                            <div class="cat-box w-96 ${themeClasses[idx] || 'theme-orange'}">
                                <div class="cat-header"><span class="text-3xl font-black tracking-wider">${cat}</span></div>
                                <div class="p-6 flex flex-wrap gap-4 justify-center">
                                    ${selectedItems.filter(i => i.cat === cat).map(i => `<div class="vocab-card"><img src="${i.path}" class="w-full"><p>${i.name}</p></div>`).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="setView('GAME')" class="px-24 py-6 btn-orange btn-active rounded-full font-black text-4xl mt-10">開始遊戲 🚀</button>
                </div>
            `;
        }

        // --- Fix 2: Auto-Sizer & Pointer-Drag ---
        function renderGameStage(app) {
            const shuffled = [...selectedItems].sort(() => Math.random() - 0.5);
            const zones = gameMode === 'free' ? ['分類 A', '分類 B'] : [...new Set(selectedItems.map(i => i.cat))];

            // Auto-size cards to fit
            let autoWidth = 110;
            if(selectedItems.length > 15) autoWidth = 85;
            if(selectedItems.length > 25) autoWidth = 65;
            document.documentElement.style.setProperty('--card-width', autoWidth + 'px');

            app.innerHTML = `
                <div class="game-viewport">
                    <div id="shuffled-box" class="h-[28%] border-4 border-dashed border-white rounded-3xl p-4 flex flex-wrap gap-3 justify-center bg-white/70 overflow-y-auto">
                        ${shuffled.map((v) => `
                            <div id="${v.id}" data-cat="${v.cat}" class="vocab-card shadow-lg" onpointerdown="startDrag(event)">
                                <img src="${v.path}" class="w-full pointer-events-none"><p>${v.name}</p>
                            </div>
                        `).join('')}
                    </div>
                    <div class="flex-1 flex gap-4 w-full overflow-x-auto pb-2 px-2 items-stretch">
                        ${zones.map((cat, idx) => `
                            <div class="cat-box flex-1 min-w-[260px] drop-zone ${themeClasses[idx] || 'theme-orange'}" data-zone-cat="${cat}">
                                <div class="cat-header pointer-events-none"><span class="text-2xl font-black">${cat}</span></div>
                                <div class="flex-1 p-3 flex flex-wrap gap-2 content-start justify-center slot-container pointer-events-none"></div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="h-14 flex justify-center gap-6 shrink-0">
                        <button onclick="setView('SELECT')" class="px-10 py-2 btn-gray btn-active rounded-full font-bold">退出</button>
                        ${gameMode === 'free' ? `<button onclick="finishGame()" class="px-12 py-2 btn-emerald btn-active rounded-full font-black">完成 ✨</button>` : ''}
                    </div>
                </div>
            `;
        }

        let dragItem = null;
        let dragOffset = { x: 0, y: 0 };

        function startDrag(e) {
            dragItem = e.currentTarget;
            const rect = dragItem.getBoundingClientRect();
            dragOffset.x = e.clientX - rect.left;
            dragOffset.y = e.clientY - rect.top;
            
            dragItem.classList.add('dragging');
            dragItem.style.width = rect.width + 'px';
            dragItem.style.left = rect.left + 'px';
            dragItem.style.top = rect.top + 'px';
            
            document.addEventListener('pointermove', moveDrag);
            document.addEventListener('pointerup', endDrag);
        }

        function moveDrag(e) {
            if(!dragItem) return;
            dragItem.style.left = (e.clientX - dragOffset.x) + 'px';
            dragItem.style.top = (e.clientY - dragOffset.y) + 'px';
        }

        function endDrag(e) {
            if(!dragItem) return;
            dragItem.hidden = true;
            const dropTarget = document.elementFromPoint(e.clientX, e.clientY);
            dragItem.hidden = false;
            
            const zone = dropTarget ? dropTarget.closest('.drop-zone') : null;
            if(zone) {
                const zoneCat = zone.getAttribute('data-zone-cat');
                const itemCat = dragItem.getAttribute('data-cat');
                const isCorrect = (gameMode === 'free' || itemCat === zoneCat);
                
                zone.querySelector('.slot-container').appendChild(dragItem);
                
                const feedback = document.createElement('div');
                feedback.className = 'feedback-pop';
                feedback.innerHTML = isCorrect ? '⭐' : '❌';
                dragItem.appendChild(feedback);
                
                sounds[isCorrect ? 'star' : 'wrong'].currentTime = 0;
                sounds[isCorrect ? 'star' : 'wrong'].play();
                if(gameMode === 'ordered') checkWin();
            } else {
                document.getElementById('shuffled-box').appendChild(dragItem);
            }

            dragItem.classList.remove('dragging');
            dragItem.style.position = 'relative';
            dragItem.style.left = 'auto';
            dragItem.style.top = 'auto';
            dragItem = null;
            document.removeEventListener('pointermove', moveDrag);
            document.removeEventListener('pointerup', endDrag);
        }

        function checkWin() {
            if (document.getElementById('shuffled-box').children.length > 0) return;
            const cards = document.querySelectorAll('.slot-container .vocab-card');
            let allCorrect = true;
            cards.forEach(card => { 
                if (card.getAttribute('data-cat') !== card.closest('.cat-box').getAttribute('data-zone-cat')) allCorrect = false; 
            });
            if (allCorrect) finishGame();
        }

        function finishGame() {
            confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
            sounds.hooray.play();
        }

        function handleSizeChange(val) {
            document.documentElement.style.setProperty('--card-width', val + 'px');
        }

        function handleTextToggle(isVisible) {
            const app = document.getElementById('app');
            isVisible ? app.classList.remove('hide-text') : app.classList.add('hide-text');
        }

        function goNextFromSelect() {
            if (selectedItems.length === 0) return alert('請先選擇圖片');
            setView(gameMode === 'free' ? 'GAME' : 'PREP');
        }

        async function exportResult() {
            const app = document.getElementById('app');
            const canvas = await html2canvas(app, { scale: 2, useCORS: true });
            const link = document.createElement('a');
            link.download = '分類練習結果.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        updateView();
    </script>
</body>
</html>
