    <style>
        :root { 
            --card-width: 110px; 
            --card-font-size: 1.1rem;
            --blue-dark: #0EA5E9; 
            --orange-dark: #EA580C;
            --pink-main: #FB6764;
            --blue-main: #4BD8F8;
        }
        body { font-family: "PingFang HK", "Heiti TC", sans-serif; overflow-x: hidden; user-select: none; }
        
        .bg-park { background: url('images/park.jpg') center/cover fixed; }
        .bg-room { background: url('images/room.jpg') center/cover fixed; }
        .bg-road { background: url('images/road.jpg') center/cover fixed; }
        .bg-game { background: url('images/game.jpg') center/cover fixed; }
        .bg-white { background-color: #ffffff; }

        /* 3D Button Style */
        .btn-blue { background-color: var(--blue-dark); border-bottom: 5px solid #0369a1; color: white; }
        .btn-orange { background-color: var(--orange-dark); border-bottom: 5px solid #9a3412; color: white; }
        .btn-emerald { background-color: #059669; border-bottom: 5px solid #064e3b; color: white; }
        .btn-gray { background-color: #6b7280; border-bottom: 5px solid #374151; color: white; }
        .btn-active:active { transform: translateY(2px); border-bottom-width: 2px; }

        /* Card Styling */
        .vocab-card {
            width: var(--card-width);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }
        .vocab-card p { font-size: var(--card-font-size); font-weight: 400; text-align: center; margin-top: 4px; }
        .selected-card { outline: 6px solid #22c55e; box-shadow: 0 0 20px rgba(34, 197, 94, 0.5); }

        /* Hide Text Mode */
        .hide-text p { display: none !important; }
        .hide-text .vocab-card { height: var(--card-width); justify-content: center; }

        /* Category Box Themes */
        .cat-box { display: flex; flex-direction: column; border-radius: 24px; overflow: hidden; background: white; border-width: 6px; height: 100%; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .cat-header { padding: 15px 20px; color: white; font-weight: 900; display: flex; align-items: center; gap: 15px; }
        
        .theme-pink { border-color: #FB6764; } .theme-pink .cat-header { background-color: #FB6764; }
        .theme-blue { border-color: #4BD8F8; } .theme-blue .cat-header { background-color: #4BD8F8; }
        .theme-green { border-color: #4ad395; } .theme-green .cat-header { background-color: #4ad395; }
        .theme-orange { border-color: #fb923c; } .theme-orange .cat-header { background-color: #fb923c; }

        /* Feedback Animation */
        .feedback-pop {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            font-size: 4rem; z-index: 50; pointer-events: none;
            animation: popUp 0.8s ease-out forwards;
        }
        @keyframes popUp {
            0% { transform: translate(-50%, 10px) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -30px) scale(1.3); opacity: 1; }
            100% { transform: translate(-50%, -50px) scale(1); opacity: 0; }
        }

        .game-viewport { height: calc(100vh - 110px); display: flex; flex-direction: column; gap: 1rem; }
    </style>
</head>
<body class="bg-park">

    <nav class="fixed top-0 left-0 w-full h-14 bg-white shadow-sm z-[100] flex items-center justify-between px-4">
        <div class="flex gap-2">

        </div>

            <div class="flex items-center gap-2">

            </div>
            <label class="flex items-center gap-1 cursor-pointer">
                <input type="checkbox" id="showTextToggle" checked onchange="handleTextToggle(this.checked)"> 顯示文字
            </label>
            <select onchange="document.body.className = 'bg-' + this.value" class="border rounded-md px-2 py-1 bg-gray-50">
                <option value="park">草地</option>
                <option value="room">房間</option>
                <option value="road">馬路</option>
                <option value="game">遊戲</option>

            </select>
            <button onclick="exportResult()" class="px-4 py-1 bg-emerald-600 text-white rounded-md font-bold btn-active shadow-md">匯出 💾</button>
        </div>
    </nav>

            selectedItems = []; // Reset selection when returning home
            view = 'SUB_MODES'; 
            updateView(); 
        }

        function updateView() {
            const app = document.getElementById('app');
            const isTextHidden = !document.getElementById('showTextToggle').checked;
            app.className = "mt-16 p-4 " + (isTextHidden ? "hide-text" : "");
            
            if (view === 'SUB_MODES') {
                app.innerHTML = `
                <div class="flex flex-col items-center justify-center gap-12 py-20">
                    <h1 class="text-4xl font-black text-blue-900 mb-4">請選擇分類方式</h1>
                    <div class="flex gap-10">
                        <button onclick="setView('SELECT', 'ordered')" class="w-72 h-40 text-white text-4xl font-black rounded-3xl btn-blue btn-active">按類別分類</button>
                        <button onclick="setView('SELECT', 'free')" class="w-72 h-40 text-white text-4xl font-black rounded-3xl btn-orange btn-active">自由分類</button>
                    </div>
                </div>`;
            }
            else if (view === 'SELECT') { renderSelection(app); }
            else if (view === 'PREP') { renderPrepBoard(app); }
            else if (view === 'GAME') { renderGameStage(app); }
        }

        function renderSelection(app) {
            app.innerHTML = `
                <div class="sticky top-14 z-40 bg-white/90 p-4 rounded-2xl mb-6 shadow-sm flex justify-between items-center border border-gray-200">
                    <div class="flex gap-4">
                        <select onchange="document.getElementById('section-'+this.value).scrollIntoView({behavior: 'smooth'})" class="p-2 border-2 border-gray-200 rounded-xl font-bold bg-white">
                            <option>跳至類別...</option>
                            ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                        </select>
                        <input type="text" id="searchInput" placeholder="🔍 搜尋詞彙..." class="p-2 border-2 border-gray-200 rounded-xl w-64" oninput="filterGrid(this.value)">
                    </div>
                    <button onclick="goNextFromSelect()" class="px-8 py-3 btn-orange btn-active rounded-full font-black text-xl">下一步：已選取 ${selectedItems.length} 張</button>
                </div>
                <div id="selection-grid-container"></div>
                <button onclick="setView('SUB_MODES')" class="mt-8 px-10 py-2 btn-gray btn-active rounded-full font-bold">返回</button>
            `;
            filterGrid('');
        }

        function filterGrid(term) {
            const container = document.getElementById('selection-grid-container');
            if (!container) return;
            let html = '';

            if (term.trim()) {
                const filtered = vocabList.filter(v => v.name.includes(term));
                html = `<div class="flex flex-wrap gap-4 p-4 bg-white/30 rounded-2xl">${filtered.map(v => renderCardHTML(v)).join('')}</div>`;
            } else {
                categories.forEach(cat => {
                    html += `
                    <div id="section-${cat}" class="mb-8">
                        <div class="bg-orange-600 text-white px-6 py-2 rounded-t-xl flex justify-between items-center shadow-md">
                            <span class="text-xl font-black">${cat}</span>
                            <button onclick="selectAllInCat('${cat}')" class="text-sm bg-white/20 px-4 py-1 rounded-full font-bold hover:bg-white/40">全選</button>
                        </div>
                        <div class="bg-white/40 p-5 rounded-b-xl flex flex-wrap gap-4 border-x border-b border-orange-200">
                            ${vocabList.filter(v => v.cat === cat).map(v => renderCardHTML(v)).join('')}
                        </div>
                    </div>`;
                });
            }
            container.innerHTML = html;
        }

        function renderCardHTML(v) {
            const active = selectedItems.some(i => i.id === v.id) ? 'selected-card' : '';
            return `<div onclick="toggleItem('${v.id}')" class="vocab-card cursor-pointer ${active}"><img src="${v.path}" class="w-full pointer-events-none"><p>${v.name}</p></div>`;
        }

        function renderPrepBoard(app) {
            const activeCats = [...new Set(selectedItems.map(i => i.cat))];
            app.innerHTML = `
                <div class="flex flex-col items-center gap-6">
                    <button onclick="setView('SELECT')" class="px-8 py-2 btn-gray btn-active rounded-xl font-bold self-start">← 返回修改</button>
                    <div class="flex flex-wrap justify-center gap-8 w-full px-4">
                        ${activeCats.map((cat, idx) => `
                            <div class="cat-box w-96 ${themeClasses[idx] || 'theme-orange'}">
                                <div class="cat-header">
                                    <img src="images/categories/${cat}.png" class="w-16 h-16 object-contain"> 
                                    <span class="text-3xl font-black tracking-wider">${cat}</span>
                                </div>
                                <div class="p-6 flex flex-wrap gap-4 justify-center">
                                    ${selectedItems.filter(i => i.cat === cat).map(i => `<div class="vocab-card shadow-sm border border-gray-100"><img src="${i.path}" class="w-full"><p>${i.name}</p></div>`).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="setView('GAME')" class="px-24 py-6 btn-orange btn-active rounded-full font-black text-4xl mt-10 shadow-lg">開始遊戲 🚀</button>
                </div>
            `;
        }

        function renderGameStage(app) {
            const shuffled = [...selectedItems].sort(() => Math.random() - 0.5);
            const zones = gameMode === 'free' ? ['分類 A', '分類 B'] : [...new Set(selectedItems.map(i => i.cat))];

            app.innerHTML = `
                <div class="game-viewport">
                    <div id="shuffled-box" class="h-[30%] border-4 border-dashed border-white rounded-3xl p-6 flex flex-wrap gap-4 justify-center bg-white/70 overflow-y-auto shadow-inner">
                        ${shuffled.map((v) => `
                            <div id="${v.id}" data-cat="${v.cat}" class="vocab-card shadow-xl cursor-grab relative z-10" draggable="true" ondragstart="handleStart(event, '${v.cat}')">
                                <img src="${v.path}" class="w-full pointer-events-none"><p>${v.name}</p>
                            </div>
                        `).join('')}
                    </div>

                    <div class="flex-1 flex gap-6 w-full overflow-x-auto pb-4 px-2 items-stretch">
                        ${zones.map((cat, idx) => `
                            <div class="cat-box flex-1 min-w-[280px] ${themeClasses[idx] || 'theme-orange'}" data-zone-cat="${cat}" ondragover="event.preventDefault()" ondrop="handleDrop(event, '${cat}')">
                                ${gameMode === 'ordered' ? `
                                <div class="cat-header">
                                    <img src="images/categories/${cat}.png" class="w-14 h-14 object-contain">
                                    <span class="text-3xl font-black">${cat}</span>
                                </div>` : `<div class="h-8 w-full"></div>`}
                                <div class="flex-1 overflow-y-auto p-5 flex flex-wrap gap-4 content-start justify-center slot-container"></div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="h-14 flex justify-center gap-6 shrink-0">
                        <button onclick="setView('SELECT')" class="px-10 py-2 btn-gray btn-active rounded-full font-bold">退出遊戲</button>
                        ${gameMode === 'free' ? `<button onclick="finishGame(true)" class="px-12 py-2 btn-emerald btn-active rounded-full font-black text-xl">完成分類 ✨</button>` : ''}
                    </div>
                </div>
            `;
        }

        // --- Logic Handlers ---
        function handleSizeChange(val) {
            document.documentElement.style.setProperty('--card-width', val + 'px');
            document.documentElement.style.setProperty('--card-font-size', (val/100) + 'rem');
        }

        function handleTextToggle(isVisible) {
            updateView();
        }

        let currentDragCat = '';
        function handleStart(e, cat) { currentDragCat = cat; e.dataTransfer.setData('text', e.target.id); }

        function handleDrop(e, zoneCat) {
            e.preventDefault();
            const id = e.dataTransfer.getData('text');
            const el = document.getElementById(id);
            const container = e.currentTarget.querySelector('.slot-container');
            if(!container || !el) return;

            container.appendChild(el);
            const existing = el.querySelector('.feedback-pop');
            if(existing) existing.remove();

            const isCorrect = (gameMode === 'free' || currentDragCat === zoneCat);
            const feedback = document.createElement('div');
            feedback.className = 'feedback-pop';
            feedback.innerHTML = isCorrect ? '⭐' : '❌';
            el.appendChild(feedback);
            
            sounds[isCorrect ? 'star' : 'wrong'].currentTime = 0;
            sounds[isCorrect ? 'star' : 'wrong'].play();
            if (gameMode === 'ordered') checkWin();
        }

        function checkWin() {
            if (document.getElementById('shuffled-box').children.length > 0) return;
            const cards = document.querySelectorAll('.slot-container .vocab-card');
            let allCorrect = true;
            cards.forEach(card => { 
                if (card.getAttribute('data-cat') !== card.closest('.cat-box').getAttribute('data-zone-cat')) allCorrect = false; 
            });
            if (allCorrect) finishGame(false);
        }

        function finishGame(isFree) {
            confetti({ particleCount: 250, spread: 90, origin: { y: 0.7 } });
            sounds.hooray.play();
        }

        function toggleItem(id) {
            const idx = selectedItems.findIndex(i => i.id === id);
            if (idx > -1) selectedItems.splice(idx, 1);
            else selectedItems.push(vocabList.find(v => v.id === id));
            updateView();
        }

        function selectAllInCat(cat) {
            vocabList.filter(v => v.cat === cat).forEach(i => { if(!selectedItems.some(s=>s.id===i.id)) selectedItems.push(i); });
            updateView();
        }

        function goNextFromSelect() {
            if (selectedItems.length === 0) return alert('請先選擇圖片');
            setView(gameMode === 'free' ? 'GAME' : 'PREP');
        }

        async function exportResult() {
            const app = document.getElementById('app');
            const canvas = await html2canvas(app, { scale: 2, useCORS: true });
            const link = document.createElement('a');
            link.download = '分類練習結果.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        updateView();
    </script>
</body>
</html>
