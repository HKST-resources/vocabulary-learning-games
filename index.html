<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>詞彙學習遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --dynamic-card-size: 100px; 
            --blue-dark: #0EA5E9; 
            --orange-dark: #EA580C;
        }
        body { 
            font-family: "PingFang HK", "Heiti TC", sans-serif; 
            overflow: hidden; /* Prevent iPad whole-page bounce */
            user-select: none; -webkit-user-select: none;
            touch-action: none; 
        }
        
        .bg-park { background: url('images/park.jpg') center/cover fixed; }
        .bg-room { background: url('images/room.jpg') center/cover fixed; }
        .bg-road { background: url('images/road.jpg') center/cover fixed; }
        .bg-game { background: url('images/game.jpg') center/cover fixed; }
        .bg-white { background-color: #ffffff; }

        .btn-blue { background-color: var(--blue-dark); border-bottom: 5px solid #0369a1; color: white; }
        .btn-orange { background-color: var(--orange-dark); border-bottom: 5px solid #9a3412; color: white; }
        .btn-emerald { background-color: #059669; border-bottom: 5px solid #064e3b; color: white; }
        .btn-gray { background-color: #6b7280; border-bottom: 5px solid #374151; color: white; }
        .btn-active:active { transform: translateY(2px); border-bottom-width: 2px; }

        .vocab-card {
            width: var(--dynamic-card-size);
            height: auto;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            padding: 5px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            touch-action: none;
            position: relative;
            z-index: 10;
        }
        
        .dragging {
            position: fixed !important;
            z-index: 1000 !important;
            pointer-events: none;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            transform: scale(1.15);
        }

        .vocab-card p { font-size: calc(var(--dynamic-card-size) * 0.15); font-weight: bold; text-align: center; margin-top: 2px; line-height: 1.1; }
        .selected-card { outline: 6px solid #22c55e; box-shadow: 0 0 20px rgba(34, 197, 94, 0.5); }
        .hide-text p { display: none !important; }

        /* Split Screen Layout */
        .game-stage-container {
            display: flex;
            height: calc(100vh - 80px);
            gap: 15px;
            padding: 10px;
        }

        .shuffle-sidebar {
            width: 30%;
            background: rgba(255,255,255,0.6);
            border: 3px dashed white;
            border-radius: 20px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            justify-content: center;
            gap: 8px;
            padding: 15px;
            overflow: hidden; /* Prevent internal scroll */
        }

        .target-zones {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 100%;
        }

        .cat-box { 
            flex: 1; 
            display: flex; 
            border-radius: 18px; 
            overflow: hidden; 
            background: white; 
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .cat-sidebar {
            width: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 10px;
            font-weight: 900;
        }
        
        .slot-container {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px;
            align-content: flex-start;
        }

        .theme-pink { border-color: #FB6764; } .theme-pink .cat-sidebar { background-color: #FB6764; }
        .theme-blue { border-color: #4BD8F8; } .theme-blue .cat-sidebar { background-color: #4BD8F8; }
        .theme-green { border-color: #4ad395; } .theme-green .cat-sidebar { background-color: #4ad395; }
        .theme-orange { border-color: #fb923c; } .theme-orange .cat-sidebar { background-color: #fb923c; }

        .feedback-pop {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            font-size: 2.5rem; z-index: 60; pointer-events: none;
            animation: popUp 0.6s ease-out forwards;
        }
        @keyframes popUp {
            0% { transform: translate(-50%, 0) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -20px) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -35px) scale(1); opacity: 0; }
        }
    </style>
</head>
<body class="bg-park">

    <nav class="fixed top-0 left-0 w-full h-14 bg-white shadow-sm z-[100] flex items-center justify-between px-4">

            <select onchange="document.body.className = 'bg-' + this.value" class="border rounded-md px-2 py-1 bg-gray-50">

    </nav>

        const vocabList = bulkVocabData.trim().split('\n').map(line => {
            const [cat, name, path] = line.trim().split(/\s+/);
            return { cat, name, path: `images/${path}`, id: 'v-' + Math.random().toString(36).substr(2, 9) };
        });

        const categories = [...new Set(vocabList.map(item => item.cat))];
        const themeClasses = ['theme-pink', 'theme-blue', 'theme-green', 'theme-orange'];

        let view = 'SUB_MODES'; // Bug 1: Directly show modes
        let gameMode = ''; 
        let selectedItems = [];
        const sounds = { 
            star: new Audio('sounds/star.mp3'), 
            wrong: new Audio('sounds/wrong.mp3'), 
            hooray: new Audio('sounds/hooray.mp3') 
        };

        // Bug 4: Pre-load and fix audio consistency
        Object.values(sounds).forEach(s => s.load());

        function playFeedbackSound(isCorrect) {
            const s = isCorrect ? sounds.star : sounds.wrong;
            s.pause();
            s.currentTime = 0; // Reset to start
            s.play().catch(e => console.log("Audio play blocked", e));
        }

        function setView(v, mode) { 
            view = v; 
            if(mode) gameMode = mode; 
            updateView(); 
        }

        function showSubModes() { selectedItems = []; view = 'SUB_MODES'; updateView(); }

        function updateView() {
            const app = document.getElementById('app');
            const isTextHidden = !document.getElementById('showTextToggle')?.checked;
            app.className = "mt-16 " + (isTextHidden ? "hide-text" : "");
            
            if (view === 'SUB_MODES') {
                app.innerHTML = `
                <div class="flex flex-col items-center justify-center gap-12 py-20">
                    <div class="flex gap-10">
                        <button onclick="setView('SELECT', 'ordered')" class="w-72 h-40 text-white text-4xl font-black rounded-3xl btn-blue btn-active">按類別分類</button>
                        <button onclick="setView('SELECT', 'free')" class="w-72 h-40 text-white text-4xl font-black rounded-3xl btn-orange btn-active">自由分類</button>
                    </div>
                </div>`;
            }
            else if (view === 'SELECT') renderSelection(app);
            else if (view === 'PREP') renderPrepBoard(app);
            else if (view === 'GAME') renderGameStage(app);
        }

        function renderSelection(app) {
            app.innerHTML = `
                <div class="px-4">
                    <div class="sticky top-14 z-40 bg-white/90 p-4 rounded-2xl mb-6 shadow-sm flex justify-between items-center border border-gray-200">
                        <button id="nextBtn" onclick="goNextFromSelect()" class="px-10 py-3 btn-orange btn-active rounded-full font-black text-xl">已選取 ${selectedItems.length} 張 -> 下一步</button>
                    </div>
                    <div id="selection-grid-container" class="pb-10">
                        ${categories.map(cat => `
                            <div class="mb-6 bg-white/40 rounded-xl overflow-hidden">
                                <div class="bg-gray-700 text-white px-4 py-2 flex justify-between font-bold">
                                    <span>${cat}</span>
                                    <button onclick="selectAllInCat('${cat}')" class="text-xs bg-white/20 px-2 rounded">全選</button>
                                </div>
                                <div class="p-4 flex flex-wrap gap-3">
                                    ${vocabList.filter(v => v.cat === cat).map(v => {
                                        const active = selectedItems.some(i => i.id === v.id) ? 'selected-card' : '';
                                        return `<div id="card-${v.id}" onclick="toggleItem('${v.id}')" class="vocab-card cursor-pointer ${active}"><img src="${v.path}" class="w-full pointer-events-none"><p>${v.name}</p></div>`;
                                    }).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function toggleItem(id) {
            const idx = selectedItems.findIndex(i => i.id === id);
            const cardEl = document.getElementById(`card-${id}`);
            if (idx > -1) {
                selectedItems.splice(idx, 1);
                cardEl?.classList.remove('selected-card');
            } else {
                selectedItems.push(vocabList.find(v => v.id === id));
                cardEl?.classList.add('selected-card');
            }
            document.getElementById('nextBtn').innerText = `已選取 ${selectedItems.length} 張 -> 下一步`;
        }

        function selectAllInCat(cat) {
            vocabList.filter(v => v.cat === cat).forEach(i => {
                if(!selectedItems.some(s=>s.id===i.id)) {
                    selectedItems.push(i);
                    document.getElementById(`card-${i.id}`)?.classList.add('selected-card');
                }
            });
            document.getElementById('nextBtn').innerText = `已選取 ${selectedItems.length} 張 -> 下一步`;
        }

        function renderPrepBoard(app) {
            const activeCats = [...new Set(selectedItems.map(i => i.cat))];
            app.innerHTML = `
                <div class="flex flex-col items-center gap-6 p-4">
                    <div class="flex flex-wrap justify-center gap-6 w-full">
                        ${activeCats.map((cat, idx) => `
                            <div class="cat-box w-80 ${themeClasses[idx % 4]}">
                                <div class="cat-sidebar w-32">
                                    <img src="images/categories/${cat}.png" class="w-20 h-20 object-contain mb-2">
                                    <div class="text-xl">${cat}</div>
                                </div>
                                <div class="slot-container">
                                    ${selectedItems.filter(i => i.cat === cat).map(i => `<div class="vocab-card" style="--dynamic-card-size: 70px"><img src="${i.path}" class="w-full"><p>${i.name}</p></div>`).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="setView('GAME')" class="px-20 py-5 btn-orange btn-active rounded-full font-black text-3xl shadow-lg">開始練習 🚀</button>
                </div>
            `;
        }

        // Bug 5 & 3: Auto-Sizer and Split Layout
        function renderGameStage(app) {
            const shuffled = [...selectedItems].sort(() => Math.random() - 0.5);
            const zones = gameMode === 'free' ? ['分類 A', '分類 B'] : [...new Set(selectedItems.map(i => i.cat))];

            // Auto-calculate card size
            const count = selectedItems.length;
            let cardSize = 110;
            if (count > 12) cardSize = 90;
            if (count > 20) cardSize = 75;
            if (count > 35) cardSize = 60;
            document.documentElement.style.setProperty('--dynamic-card-size', cardSize + 'px');

            app.innerHTML = `
                <div class="game-stage-container">
                    <div id="shuffled-box" class="shuffle-sidebar">
                        ${shuffled.map((v) => `
                            <div id="${v.id}" data-cat="${v.cat}" class="vocab-card shadow-lg" onpointerdown="startDrag(event)">
                                <img src="${v.path}" class="w-full pointer-events-none"><p>${v.name}</p>
                            </div>
                        `).join('')}
                    </div>

                    <div class="target-zones">
                        ${zones.map((cat, idx) => `
                            <div class="cat-box drop-zone ${themeClasses[idx % 4]}" data-zone-cat="${cat}">
                                <div class="cat-sidebar">
                                    <img src="images/categories/${cat}.png" class="w-16 h-16 object-contain mb-1">
                                    <div class="text-lg leading-tight">${cat}</div>
                                </div>
                                <div class="slot-container"></div>
                            </div>
                        `).join('')}
                        
                        <div class="flex justify-center gap-4 mt-2 h-12">
                            <button onclick="setView('SELECT')" class="px-6 py-1 btn-gray btn-active rounded-full font-bold">返回</button>
                            ${gameMode === 'free' ? `<button onclick="finishGame()" class="px-10 py-1 btn-emerald btn-active rounded-full font-black">完成</button>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        // Improved Drag Engine for iPad
        let dragItem = null;
        let dragOffset = { x: 0, y: 0 };

        function startDrag(e) {
            e.preventDefault();
            dragItem = e.currentTarget;
            const rect = dragItem.getBoundingClientRect();
            dragOffset.x = e.clientX - rect.left;
            dragOffset.y = e.clientY - rect.top;
            
            dragItem.classList.add('dragging');
            dragItem.style.width = rect.width + 'px';
            dragItem.style.left = rect.left + 'px';
            dragItem.style.top = rect.top + 'px';
            
            document.addEventListener('pointermove', moveDrag);
            document.addEventListener('pointerup', endDrag);
        }

        function moveDrag(e) {
            if(!dragItem) return;
            dragItem.style.left = (e.clientX - dragOffset.x) + 'px';
            dragItem.style.top = (e.clientY - dragOffset.y) + 'px';
        }

        function endDrag(e) {
            if(!dragItem) return;
            dragItem.hidden = true;
            const dropTarget = document.elementFromPoint(e.clientX, e.clientY);
            dragItem.hidden = false;
            
            const zone = dropTarget?.closest('.drop-zone');
            if(zone) {
                const zoneCat = zone.getAttribute('data-zone-cat');
                const itemCat = dragItem.getAttribute('data-cat');
                const isCorrect = (gameMode === 'free' || itemCat === zoneCat);
                
                zone.querySelector('.slot-container').appendChild(dragItem);
                
                const feedback = document.createElement('div');
                feedback.className = 'feedback-pop';
                feedback.innerHTML = isCorrect ? '⭐' : '❌';
                dragItem.appendChild(feedback);
                
                playFeedbackSound(isCorrect);
                if(gameMode === 'ordered') checkWin();
            } else {
                document.getElementById('shuffled-box').appendChild(dragItem);
            }

            dragItem.classList.remove('dragging');
            dragItem.style.position = 'relative';
            dragItem.style.left = 'auto';
            dragItem.style.top = 'auto';
            dragItem = null;
            document.removeEventListener('pointermove', moveDrag);
            document.removeEventListener('pointerup', endDrag);
        }

        function checkWin() {
            const remaining = document.getElementById('shuffled-box').children.length;
            if (remaining > 0) return;
            
            const cards = document.querySelectorAll('.slot-container .vocab-card');
            let allCorrect = true;
            cards.forEach(card => { 
                if (card.getAttribute('data-cat') !== card.closest('.cat-box').getAttribute('data-zone-cat')) allCorrect = false; 
            });
            if (allCorrect) finishGame();
        }

        function finishGame() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            sounds.hooray.play();
        }

        function handleTextToggle(isVisible) {
            const app = document.getElementById('app');
            isVisible ? app.classList.remove('hide-text') : app.classList.add('hide-text');
        }

        function goNextFromSelect() {
            if (selectedItems.length === 0) return alert('請先選擇圖片');
            setView(gameMode === 'free' ? 'GAME' : 'PREP');
        }

        async function exportResult() {
            const area = document.getElementById('app');
            const canvas = await html2canvas(area, { scale: 2, useCORS: true });
            const link = document.createElement('a');
            link.download = '分類練習結果.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        updateView();
    </script>
</body>
</html>
