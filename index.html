<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>詞彙學習活動</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div id="game-container">
    <header class="game-header">
        <div class="header-left">🗣️ 詞彙練習</div>
        <div class="nav-group">
            <button class="nav-btn btn-sorting" onclick="initGame('sorting')">分類</button>
            <button class="nav-btn btn-naming" onclick="initGame('naming')">擴展性命名</button>
            <button class="nav-btn btn-ran" onclick="initGame('ran')">快速命名</button>
        </div>
    </header>

    <div class="settings-bar">
        <label>大小</label>
        <input type="range" id="sizeSlider" min="100" max="300" value="150">
        <input type="checkbox" id="textToggle" checked onchange="toggleTextDisplay()"> 顯示文字
        <select id="bgPicker" onchange="changeBg(this.value)">
            <option value="white">背景: 白色</option>
            <option value="park.jpg">草地</option>
            <option value="road.jpg">馬路</option>
            <option value="room.jpg">房間</option>
            <option value="game.jpg">遊戲</option>
            <option value="yellow.jpg">黃色</option>
            <option value="stripe.jpg">條紋</option>
        </select>
    </div>

    <div id="game-stage">
        <div style="text-align:center; padding-top:100px;">
            <h2 style="color:#7f8c8d;">請選擇上方活動開始</h2>
        </div>
    </div>
</div>

<audio id="snd-star" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="snd-hooray" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
<audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
