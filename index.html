<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>詞彙學習活動</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div id="bg-layer">
        <video id="bg-video" loop muted playsinline style="display:none;"></video>
    </div>

    <nav class="sidebar">
        <h1>🗣️詞彙學習活動</h1>
        
        <div class="menu-section">
            <button class="btn-sorting" onclick="initGame('sorting')">1. 分類遊戲</button>
            <button class="btn-naming" onclick="initGame('naming')">2. 擴展性命名</button>
            <button class="btn-ran" onclick="initGame('ran')">3. 快速命名</button>
        </div>

        <div class="settings-section">
            <hr>
            <h3>⚙️ 控制面板</h3>
            <div class="setting-item">
                <label>卡片大小</label>
                <input type="range" id="sizeSlider" min="150" max="450" value="220">
            </div>
            <div class="setting-item">
                <label><input type="checkbox" id="textToggle" checked> 顯示標籤</label>
            </div>
            <div class="setting-item">
    <label>背景選擇</label>
    <select id="bgPicker">
        <option value="white">純白背景</option>
        <optgroup label="靜態圖片">
            <option value="park.jpg">草地</option>
            <option value="road.jpg">馬路</option>
            <option value="room.jpg">房間</option>
            <option value="game.jpg">遊戲</option>
            <option value="yellow.jpg">黃色</option>
            <option value="stripe.jpg">條紋</option>
        </optgroup>
        <optgroup label="動態背景">
            <option value="nature.mp4">大自然 (影片)</option>
            <option value="night sky.mp4">夜空 (影片)</option>
        </optgroup>
    </select>
</div>
            <button class="export-btn" onclick="takeScreenshot()">📸 匯出練習結果</button>
        </div>
    </nav>

    <main id="capture-area">
        <div id="game-header"><h2 id="current-game-title">請選擇活動</h2></div>
        <div id="game-stage"></div>
    </main>

    <audio id="snd-star" src="sounds/star.mp3"></audio>
    <audio id="snd-wrong" src="sounds/wrong.mp3"></audio>
    <audio id="snd-hooray" src="sounds/hooray.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
