<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>詞彙學習活動</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <header class="top-bar">
        <div class="nav-left">
            <button class="pill-btn btn-orange" id="nav-btn-sort">分類遊戲</button>
            <button class="pill-btn btn-blue">擴展性命名</button>
            <button class="pill-btn btn-muted-green">快速命名</button>
        </div>
        <div class="nav-right">
            <div class="control-item" style="font-size:14px; font-weight:bold;">卡片大小 <input type="range" id="sizeSlider" min="100" max="180" value="130"></div>
            <div class="control-item" style="font-size:14px; font-weight:bold;"><input type="checkbox" id="textToggle" checked> 顯示文字</div>
            <select id="bgSelect" class="pill-btn" style="background:#eee; color:#333; height:36px; font-size:14px; box-shadow:none;">
                <option value="park.jpg">公園</option>
                <option value="room.jpg">房間</option>
                <option value="road.jpg">馬路</option>
                <option value="game.jpg">遊戲</option>
                <option value="yellow.jpg">黃色</option>
                <option value="stripe.jpg">條紋</option>
                <option value="white">白色</option>
            </select>
            <button class="pill-btn btn-green" style="height:36px; font-size:14px;">匯出存檔 💾</button>
        </div>
    </header>

    <main id="main-stage">
        <div style="text-align:center; padding-top:20vh;">
            <h1 style="color:white; font-size:48px; text-shadow:2px 2px 10px rgba(0,0,0,0.5);">請選擇上方活動開始遊戲</h1>
        </div>
    </main>

    <button id="global-next-btn" class="pill-btn btn-orange floating-next hidden"></button>

    <script src="script.js"></script>
</body>
</html>
