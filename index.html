<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>詞彙學習遊戲 - Vocabulary Learning Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
        
        body { font-family: 'Helvetica Neue', Arial, sans-serif; overflow-x: hidden; }
        .game-font { font-family: 'ZCOOL KuaiLe', cursive; }
        
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        
        /* Background Styles */
        .bg-park { background: url('images/park.jpg') no-repeat center center fixed; background-size: cover; }
        .bg-room { background: url('images/room.jpg') no-repeat center center fixed; background-size: cover; }
        .bg-road { background: url('images/road.jpg') no-repeat center center fixed; background-size: cover; }
        .bg-game { background: url('images/game.jpg') no-repeat center center fixed; background-size: cover; }
        .bg-yellow { background-color: #FEF9C3; }
        .bg-stripe { background: repeating-linear-gradient(45deg, #f3f4f6, #f3f4f6 10px, #ffffff 10px, #ffffff 20px); }
        .bg-white { background-color: #ffffff; }

        .drop-zone { min-height: 200px; transition: all 0.3s; }
        .dragging { opacity: 0.5; cursor: grabbing; z-index: 100; position: absolute; pointer-events: none; }
        
        /* Floating animations */
        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.5); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }
        .feedback-icon { animation: pop 0.8s ease-out forwards; }
    </style>
</head>
<body class="bg-park" id="capture-area">

    <nav class="fixed top-0 left-0 w-full h-12 bg-white/90 backdrop-blur shadow-sm z-50 flex items-center justify-between px-4">
        <div class="flex gap-2">
            <button onclick="changeGame('category')" class="px-3 py-1 bg-sky-500 text-white rounded-full text-sm font-bold hover:bg-sky-600">分類</button>
            <button onclick="changeGame('naming')" class="px-3 py-1 bg-orange-500 text-white rounded-full text-sm font-bold hover:bg-orange-600">擴展性命名</button>
            <button onclick="changeGame('fast')" class="px-3 py-1 bg-gray-400 text-white rounded-full text-sm font-bold cursor-not-allowed">快速命名</button>
        </div>

        <div class="flex items-center gap-4 text-xs font-medium text-gray-600">
            <div class="flex items-center gap-2">
                <span>圖片大小</span>
                <input type="range" id="sizeSlider" min="80" max="200" value="120" class="w-24">
            </div>
            <label class="flex items-center gap-1 cursor-pointer">
                <input type="checkbox" id="showTextToggle" checked onchange="toggleText()"> 顯示文字
            </label>
            <select id="bgSelect" onchange="changeBg(this.value)" class="border rounded px-1">
                <option value="park">草地</option>
                <option value="room">房間</option>
                <option value="road">馬路</option>
                <option value="game">遊戲</option>
                <option value="yellow">黃色</option>
                <option value="stripe">條紋</option>
                <option value="white">純白</option>
            </select>
            <button onclick="exportResult()" class="flex items-center gap-1 px-3 py-1 bg-emerald-500 text-white rounded hover:bg-emerald-600">
                💾 匯出
            </button>
        </div>
    </nav>

    <main class="mt-16 p-4 min-h-screen">

            const container = document.getElementById('app-container');

                            <input type="text" placeholder="搜尋詞彙..." class="border p-1 rounded" oninput="filterCards(this.value)">
                        </div>
                        <button onclick="goToPrep()" class="bg-orange-500 text-white px-6 py-2 rounded-full font-bold shadow-lg">下一步：已選取 ${selectedCards.length} 張</button>
                    </div>
                `;

                categories.forEach(cat => {
                    html += `
                        <div id="cat-${cat}" class="mb-8">
                            <div class="bg-orange-400 text-white px-4 py-2 rounded-t-lg flex justify-between items-center">
                                <span class="font-bold text-lg">${cat}</span>
                                <button onclick="selectAllInCategory('${cat}')" class="text-sm bg-white/20 px-2 py-1 rounded">全選此類</button>
                            </div>
                            <div class="bg-white/50 p-4 rounded-b-lg grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                                ${vocabList.filter(v => v.cat === cat).map(v => renderSelectCard(v)).join('')}
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html + `<button onclick="goBack()" class="mt-8 px-4 py-2 bg-gray-500 text-white rounded">返回</button>`;
            }
            else if (currentState === 'GAME') {
                renderGameStage();
            }
        }

        function renderSelectCard(vocab) {
            const isSelected = selectedCards.some(s => s.path === vocab.path);
            return `
                <div onclick="toggleCard('${vocab.path}')" 
                     class="cursor-pointer bg-white p-2 rounded-lg border-4 transition-all ${isSelected ? 'border-orange-500 shadow-inner' : 'border-transparent'}"
                     style="width: ${imageSize}px">
                    <img src="${vocab.path}" class="w-full aspect-square object-contain">
                    <p class="text-center mt-1 text-sm font-bold ${showText ? '' : 'hidden'}">${vocab.name}</p>
                </div>
            `;
        }

        // --- LOGIC ---
        function toggleCard(path) {
            const index = selectedCards.findIndex(s => s.path === path);
            if (index > -1) selectedCards.splice(index, 1);
            else selectedCards.push(vocabList.find(v => v.path === path));
            render();
        }

        function startSelection(mode) {
            gameMode = mode;
            currentState = 'SELECT';
            render();
        }

        function goToPrep() {
            if (selectedCards.length === 0) return alert('請先選取圖片');
            currentState = (gameMode === 'free') ? 'GAME' : 'GAME'; // Prep logic simplified for now
            render();
        }

        function goBack() {
            if (currentState === 'SELECT') currentState = 'HOME';
            else if (currentState === 'GAME') currentState = 'SELECT';
            render();
        }

        function changeBg(val) {
            document.body.className = `bg-${val}`;
        }

        function toggleText() {
            showText = !showText;
            render();
        }

        // --- EXPORT FUNCTION ---
        async function exportResult() {
            const element = document.getElementById('capture-area');
            const canvas = await html2canvas(element, {
                useCORS: true,
                scale: 2,
                scrollY: -window.scrollY
            });
            const link = document.createElement('a');
            link.download = `遊戲結果_${new Date().getTime()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        // --- GAME ENGINE ---
        function renderGameStage() {
            const container = document.getElementById('app-container');
            const shuffled = [...selectedCards].sort(() => Math.random() - 0.5);
            const activeCats = [...new Set(selectedCards.map(s => s.cat))];

            container.innerHTML = `
                <div class="flex flex-col gap-8">
                    <div id="shuffled-box" class="min-h-[150px] border-4 border-dashed border-white/50 rounded-2xl p-4 flex flex-wrap gap-4 justify-center bg-white/20">
                        ${shuffled.map((v, i) => `
                            <div id="drag-${i}" class="draggable-card cursor-grab active:cursor-grabbing bg-white p-2 rounded-lg shadow-lg" 
                                 style="width:${imageSize}px" draggable="true" ondragstart="handleDragStart(event, '${v.cat}', '${v.name}')">
                                <img src="${v.path}" class="w-full pointer-events-none">
                                <p class="text-center font-bold ${showText ? '' : 'hidden'}">${v.name}</p>
                            </div>
                        `).join('')}
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        ${activeCats.map(cat => `
                            <div class="drop-zone bg-white/40 rounded-3xl p-4 border-4 border-white" ondragover="event.preventDefault()" ondrop="handleDrop(event, '${cat}')">
                                <div class="flex items-center gap-2 mb-4 bg-white/60 p-2 rounded-xl">
                                    <img src="images/categories/${cat}.png" class="w-8 h-8" onerror="this.style.display='none'">
                                    <h3 class="font-bold text-xl text-gray-700">${cat}</h3>
                                </div>
                                <div class="flex flex-wrap gap-2 slot-container"></div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <button onclick="goBack()" class="mt-8 px-4 py-2 bg-gray-500 text-white rounded">返回</button>
            `;
        }

        let draggedData = null;

        function handleDragStart(e, cat, name) {
            draggedData = { cat, name, elementId: e.target.id };
        }

        function handleDrop(e, zoneCat) {
            e.preventDefault();
            const target = e.currentTarget.querySelector('.slot-container');
            const sourceEl = document.getElementById(draggedData.elementId);

            if (gameMode === 'free' || draggedData.cat === zoneCat) {
                target.appendChild(sourceEl);
                showFeedback(true, e.clientX, e.clientY);
                checkWin();
            } else {
                showFeedback(false, e.clientX, e.clientY);
            }
        }

        function showFeedback(isCorrect, x, y) {
            const icon = document.createElement('div');
            icon.className = 'fixed text-6xl pointer-events-none z-[100] feedback-icon';
            icon.style.left = `${x - 30}px`;
            icon.style.top = `${y - 30}px`;
            icon.innerHTML = isCorrect ? '⭐' : '❌';
            document.body.appendChild(icon);
            sounds[isCorrect ? 'star' : 'wrong'].play();
            setTimeout(() => icon.remove(), 800);
        }

        function checkWin() {
            const remaining = document.getElementById('shuffled-box').children.length;
            if (remaining === 0) {
                confetti();
                sounds.hooray.play();
            }
        }

        // Init
        render();
    </script>
</body>
</html>
