<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>詞彙學習專業工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --card-width: 110px; 
            --card-font-size: 1.1rem;
            --blue-main: #4BD8F8;
            --blue-shadow: #3bb8d6;
            --orange-main: #f97316;
            --orange-shadow: #c2410c;
        }
        body { font-family: "PingFang HK", "Heiti TC", sans-serif; overflow-x: hidden; user-select: none; }
        .bg-park { background: url('images/park.jpg') center/cover fixed; }
        .bg-white { background-color: #ffffff; }

        /* 3D Button Style - Shadow matches button color */
        .btn-blue { background-color: var(--blue-main); border-bottom: 5px solid var(--blue-shadow); color: white; }
        .btn-orange { background-color: var(--orange-main); border-bottom: 5px solid var(--orange-shadow); color: white; }
        .btn-emerald { background-color: #10b981; border-bottom: 5px solid #059669; color: white; }
        .btn-gray { background-color: #9ca3af; border-bottom: 5px solid #6b7280; color: white; }
        .btn-active:active { transform: translateY(2px); border-bottom-width: 2px; }

        /* Card Styles */
        .vocab-card {
            width: var(--card-width);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }
        .vocab-card p { font-size: var(--card-font-size); font-weight: 400; text-align: center; margin-top: 4px; }
        .selected-card { outline: 6px solid #22c55e; box-shadow: 0 0 20px rgba(34, 197, 94, 0.5); }
        
        /* Hidden Text - Makes cards square */
        .hide-text p { display: none !important; }
        .hide-text .vocab-card { height: var(--card-width); justify-content: center; }

        /* Category Boxes */
        .cat-box { display: flex; flex-direction: column; border-radius: 24px; overflow: hidden; background: white; border-width: 6px; height: 100%; }
        .cat-header { padding: 15px 20px; color: white; font-weight: 900; display: flex; align-items: center; gap: 15px; }
        
        .theme-pink { border-color: #FB6764; } .theme-pink .cat-header { background-color: #FB6764; }
        .theme-blue { border-color: #4BD8F8; } .theme-blue .cat-header { background-color: #4BD8F8; }
        .theme-green { border-color: #4ad395; } .theme-green .cat-header { background-color: #4ad395; }
        .theme-orange { border-color: #fb923c; } .theme-orange .cat-header { background-color: #fb923c; }

        /* Timer/Game Elements */
        .timer-container { width: 100%; height: 25px; background: #e2e8f0; border-radius: 999px; position: relative; overflow: visible; }
        .timer-progress { height: 100%; border-radius: 999px; transition: width 0.1s linear; }
        .timer-emoji { position: absolute; top: -15px; font-size: 40px; transition: all 0.1s linear; }
        .big-star-btn { font-size: 110px; cursor: pointer; filter: drop-shadow(0 8px 0 #b45309); transition: transform 0.1s; }
        .big-star-btn:active { transform: scale(0.9) translateY(8px); filter: drop-shadow(0 2px 0 #b45309); }

        .summary-card { filter: grayscale(100%); opacity: 0.5; cursor: pointer; }
        .summary-card.scored { filter: grayscale(0%); opacity: 1; outline: 6px solid #22c55e; }

        .feedback-pop {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            font-size: 4rem; z-index: 50; pointer-events: none;
            animation: popUp 0.8s ease-out forwards;
        }
        @keyframes popUp {
            0% { transform: translate(-50%, 10px) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -30px) scale(1.3); opacity: 1; }
            100% { transform: translate(-50%, -50px) scale(1); opacity: 0; }
        }
    </style>
</head>
<body class="bg-park">

    <nav class="fixed top-0 left-0 w-full h-14 bg-white shadow-md z-[100] flex items-center justify-between px-4">
        <div class="flex gap-2">
            <button onclick="setGameMode('SORT')" id="nav-sort" class="px-5 py-1 rounded-xl font-bold btn-blue btn-active">分類遊戲</button>
            <button onclick="setGameMode('DIV')" id="nav-div" class="px-5 py-1 rounded-xl font-bold btn-orange btn-active">擴展性命名</button>
            <button class="px-5 py-1 rounded-xl font-bold opacity-50 btn-gray">快速命名</button>
        </div>
        <div class="flex items-center gap-4 text-sm font-bold text-gray-700">
            <div class="flex items-center gap-2">
                <span>大小</span>
                <input type="range" id="sizeSlider" min="80" max="220" value="110" oninput="handleSizeChange(this.value)">
            </div>
            <label class="flex items-center gap-1 cursor-pointer">
                <input type="checkbox" id="showTextToggle" checked onchange="handleTextToggle(this.checked)"> 顯示文字
            </label>
            <button onclick="exportResult()" class="px-4 py-1 bg-emerald-600 text-white rounded-md font-bold btn-active">匯出 💾</button>
        </div>
    </nav>

    <main id="app" class="mt-16 p-4">
        </main>

    <script>
        const bulkVocabData = `水果 哈密瓜 水果/哈密瓜.png\n水果 士多啤梨 水果/士多啤梨.png\n水果 奇異果 水果/奇異果.png\n蔬菜 粟米 蔬菜/粟米.png\n蔬菜 紅椒 蔬菜/紅椒.png\n蔬菜 白菜 蔬菜/白菜.png\n動物 狗 動物/狗.png\n動物 貓 動物/貓.png`; 
        const vocabList = bulkVocabData.trim().split('\n').map(line => {
            const [cat, name, path] = line.trim().split(/\s+/);
            return { cat, name, path: `images/${path}`, id: 'v-' + Math.random().toString(36).substr(2, 9) };
        });
        const categories = [...new Set(vocabList.map(item => item.cat))];
        const themeClasses = ['theme-pink', 'theme-blue', 'theme-green', 'theme-orange'];

        // App State
        let activeGame = 'SORT'; // SORT or DIV
        let currentView = 'WELCOME';
        let sortSubMode = ''; // ordered or free
        let selectedItems = [];
        let customCategory = "";
        let timerType = 'bomb';
        let duration = 15;
        let starCount = 0;
        let timeLeft = 0;
        let timerInterval = null;
        let scoredIds = [];

        const sounds = {
            star: new Audio('sounds/star.mp3'),
            hooray: new Audio('sounds/hooray.mp3'),
            bomb: new Audio('sounds/bomb.mp3'),
            wrong: new Audio('sounds/wrong.mp3')
        };

        function setGameMode(mode) {
            activeGame = mode;
            selectedItems = [];
            customCategory = "";
            currentView = (mode === 'SORT') ? 'SORT_MODES' : 'SELECT';
            updateView();
        }

        function updateView() {
            const app = document.getElementById('app');
            const isTextHidden = !document.getElementById('showTextToggle').checked;
            app.className = "mt-16 p-4 " + (isTextHidden ? "hide-text" : "");
            
            if (currentView === 'WELCOME') {
                app.innerHTML = `<div class="flex h-[70vh] items-center justify-center text-3xl text-gray-400 font-bold">請選擇上方活動開始</div>`;
            } 
            else if (currentView === 'SORT_MODES') {
                app.innerHTML = `
                <div class="flex flex-col items-center justify-center gap-12 py-20">
                    <div class="flex gap-10">
                        <button onclick="sortSubMode='ordered'; currentView='SELECT'; updateView();" class="w-72 h-40 text-white text-4xl font-black rounded-3xl btn-blue btn-active">按類別分類</button>
                        <button onclick="sortSubMode='free'; currentView='SELECT'; updateView();" class="w-72 h-40 text-white text-4xl font-black rounded-3xl btn-orange btn-active">自由分類</button>
                    </div>
                </div>`;
            }
            else if (currentView === 'SELECT') renderSelection(app);
            else if (currentView === 'PREP') renderPreparation(app);
            else if (currentView === 'GAME') (activeGame === 'SORT') ? renderSortGame(app) : renderDivGame(app);
            else if (currentView === 'DIV_CONTROLS') renderDivControls(app);
            else if (currentView === 'SUMMARY') renderSummary(app);
        }

        // --- SHARED SELECTION PAGE ---
        function renderSelection(app) {
            app.innerHTML = `
                <div class="sticky top-14 z-40 bg-white/90 p-4 rounded-2xl mb-6 shadow-sm flex flex-col gap-4 border border-gray-200">
                    <div class="flex justify-between items-center">
                        <div class="flex gap-4">
                            <select onchange="document.getElementById('section-'+this.value).scrollIntoView({behavior:'smooth'})" class="p-2 border-2 border-gray-200 rounded-xl font-bold">
                                <option>跳至類別...</option>
                                ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                            <input type="text" id="searchInput" placeholder="🔍 搜尋詞彙..." class="p-2 border-2 border-gray-200 rounded-xl w-64" oninput="filterGrid(this.value)">
                        </div>
                        ${activeGame === 'DIV' ? `
                        <div class="flex items-center gap-2 bg-blue-50 p-2 rounded-xl border-2 border-blue-200">
                            <span class="font-bold text-blue-700 text-sm">自訂類別:</span>
                            <input type="text" placeholder="例如：紅色的水果" class="p-2 border rounded-lg w-64" value="${customCategory}" onchange="customCategory=this.value">
                        </div>` : ''}
                        <button onclick="goNext()" class="px-8 py-3 btn-orange btn-active rounded-full font-black text-xl">下一步 (${selectedItems.length})</button>
                    </div>
                </div>
                <div id="grid-container"></div>
            `;
            filterGrid('');
        }

        function filterGrid(term) {
            const container = document.getElementById('grid-container');
            let html = '';
            categories.forEach(cat => {
                const items = vocabList.filter(v => v.cat === cat && v.name.includes(term));
                if (items.length > 0) {
                    html += `
                    <div id="section-${cat}" class="mb-8">
                        <div class="bg-orange-600 text-white px-6 py-2 rounded-t-xl flex justify-between items-center">
                            <span class="text-xl font-black">${cat}</span>
                            <button onclick="selectAll('${cat}')" class="bg-white/20 px-4 py-1 rounded-full text-sm font-bold">全選</button>
                        </div>
                        <div class="bg-white/40 p-5 rounded-b-xl flex flex-wrap gap-4 border border-orange-200">
                            ${items.map(v => {
                                const active = selectedItems.some(i => i.id === v.id) ? 'selected-card' : '';
                                return `<div onclick="toggleItem('${v.id}')" class="vocab-card cursor-pointer ${active}"><img src="${v.path}" class="w-full"><p>${v.name}</p></div>`;
                            }).join('')}
                        </div>
                    </div>`;
                }
            });
            container.innerHTML = html;
        }

        // --- PREPARATION PAGE ---
        function renderPreparation(app) {
            const activeCats = [...new Set(selectedItems.map(i => i.cat))];
            app.innerHTML = `
                <div class="flex flex-col items-center gap-8">
                    <button onclick="currentView='SELECT'; updateView()" class="px-8 py-2 btn-gray btn-active rounded-xl font-bold self-start">← 返回修改</button>
                    <div class="flex flex-wrap justify-center gap-8 w-full">
                        <div class="cat-box w-full max-w-5xl theme-blue">
                            <div class="cat-header">
                                <span class="text-3xl font-black">${activeGame === 'DIV' ? (customCategory || selectedItems[0]?.cat || '分類名稱') : '準備練習內容'}</span>
                            </div>
                            <div class="p-8 flex flex-wrap gap-4 justify-center">
                                ${selectedItems.map(i => `<div class="vocab-card shadow-sm border"><img src="${i.path}" class="w-full"><p>${i.name}</p></div>`).join('')}
                            </div>
                        </div>
                    </div>
                    <button onclick="activeGame==='SORT'?currentView='GAME':currentView='DIV_CONTROLS'; updateView()" class="px-20 py-5 btn-orange btn-active rounded-full font-black text-4xl shadow-xl">開始遊戲 🚀</button>
                </div>
            `;
        }

        // --- GAME 1: CATEGORIZATION ---
        function renderSortGame(app) {
            const shuffled = [...selectedItems].sort(() => Math.random() - 0.5);
            const zones = sortSubMode === 'free' ? ['分類 A', '分類 B'] : [...new Set(selectedItems.map(i => i.cat))];

            app.innerHTML = `
                <div class="flex flex-col h-[82vh] gap-4">
                    <div id="shuffled-box" class="h-1/3 border-4 border-dashed border-white rounded-3xl p-6 flex flex-wrap gap-4 justify-center bg-white/70 overflow-y-auto">
                        ${shuffled.map((v) => `
                            <div id="${v.id}" data-cat="${v.cat}" class="vocab-card shadow-xl cursor-grab relative" draggable="true" ondragstart="drag(event)">
                                <img src="${v.path}" class="w-full pointer-events-none"><p>${v.name}</p>
                            </div>
                        `).join('')}
                    </div>
                    <div class="flex-1 flex gap-6 overflow-x-auto pb-4">
                        ${zones.map((cat, idx) => `
                            <div class="cat-box flex-1 min-w-[280px] ${themeClasses[idx] || 'theme-orange'}" data-zone="${cat}" ondragover="allowDrop(event)" ondrop="drop(event, '${cat}')">
                                ${sortSubMode === 'ordered' ? `
                                <div class="cat-header">
                                    <img src="images/categories/${cat}.png" class="w-14 h-14 object-contain">
                                    <span class="text-3xl font-black">${cat}</span>
                                </div>` : `<div class="h-8 bg-gray-100"></div>`}
                                <div class="flex-1 overflow-y-auto p-5 flex flex-wrap gap-4 content-start justify-center slot-container"></div>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="currentView='SELECT'; updateView()" class="btn-gray btn-active px-10 py-2 rounded-full font-bold self-center">退出遊戲</button>
                </div>
            `;
        }

        // --- GAME 2: DIVERGENT NAMING CONTROLS ---
        function renderDivControls(app) {
            app.innerHTML = `
                <div class="flex flex-col items-center justify-center py-10 gap-10">
                    <h2 class="text-4xl font-black text-blue-900">計時器設定</h2>
                    <div class="flex gap-8">
                        <button onclick="timerType='bomb';updateView()" class="w-48 h-48 rounded-3xl border-8 ${timerType==='bomb'?'border-orange-500 bg-orange-100':'border-white bg-white/50'} flex flex-col items-center justify-center text-6xl">💣<span class="text-xl font-bold mt-2">炸彈爆炸</span></button>
                        <button onclick="timerType='car';updateView()" class="w-48 h-48 rounded-3xl border-8 ${timerType==='car'?'border-blue-500 bg-blue-100':'border-white bg-white/50'} flex flex-col items-center justify-center text-6xl">🏎️<span class="text-xl font-bold mt-2">賽車衝線</span></button>
                    </div>
                    <div class="flex flex-wrap gap-4 justify-center">
                        ${[5,10,15,20,25,30].map(s => `<button onclick="duration=${s};updateView()" class="w-20 py-3 rounded-xl font-bold ${duration===s?'btn-orange':'bg-white border-2'}">${s}秒</button>`).join('')}
                    </div>
                    <button onclick="currentView='GAME'; updateView(); startDivTimer();" class="px-32 py-6 btn-emerald btn-active rounded-full font-black text-4xl shadow-xl">START!</button>
                </div>
            `;
        }

        function renderDivGame(app) {
            starCount = 0;
            app.innerHTML = `
                <div class="flex flex-col items-center justify-between h-[80vh]">
                    <div class="timer-container w-[90%] mx-auto mt-6">
                        <div id="pBar" class="timer-progress w-full ${timerType==='bomb'?'bg-red-500':'bg-blue-500'}"></div>
                        <div id="tEmoji" class="timer-emoji">${timerType==='bomb'?'💣':'🏎️'}</div>
                    </div>
                    <div class="text-center">
                        <h1 class="text-6xl font-black text-blue-900">${customCategory || selectedItems[0]?.cat}</h1>
                    </div>
                    <div class="flex flex-col items-center gap-4">
                        <div onclick="countStar()" class="big-star-btn">⭐</div>
                        <div id="lCounter" class="text-8xl font-black text-orange-500">0</div>
                    </div>
                    <div class="h-10"></div>
                </div>
            `;
        }

        function renderSummary(app) {
            app.innerHTML = `
                <div id="export-target" class="bg-white p-8 rounded-3xl shadow-xl flex flex-col gap-6 max-w-5xl mx-auto border-4 border-blue-100">
                    <div class="flex justify-between items-end border-b-4 border-blue-50 pb-4">
                        <div>
                            <h2 class="text-4xl font-black text-blue-900">${customCategory || '類別命名'}</h2>
                            <p class="text-xl font-bold text-gray-400">限時：${duration}秒 | 手動計數：${starCount}次</p>
                        </div>
                        <div class="text-right">
                            <span class="text-5xl font-black text-emerald-500" id="finalCount">${scoredIds.length}</span>
                            <span class="text-2xl font-bold text-gray-300"> / ${selectedItems.length}</span>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-6 justify-center py-6">
                        ${selectedItems.map(i => `
                            <div onclick="toggleScored('${i.id}')" class="vocab-card summary-card ${scoredIds.includes(i.id)?'scored':''}">
                                <img src="${i.path}" class="w-full">
                                <p>${i.name}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="flex justify-center mt-8 mb-20"><button onclick="setGameMode('DIV')" class="px-12 py-3 btn-blue btn-active rounded-full font-bold">重新開始</button></div>
            `;
        }

        // --- LOGIC FUNCTIONS ---
        function toggleItem(id) {
            const idx = selectedItems.findIndex(i => i.id === id);
            (idx > -1) ? selectedItems.splice(idx, 1) : selectedItems.push(vocabList.find(v => v.id === id));
            updateView();
        }

        function selectAll(cat) {
            vocabList.filter(v => v.cat === cat).forEach(i => { if(!selectedItems.some(s=>s.id===i.id)) selectedItems.push(i); });
            updateView();
        }

        function goNext() {
            if (selectedItems.length === 0) return alert('請先選擇圖片');
            currentView = 'PREP'; updateView();
        }

        // Drag and Drop
        function allowDrop(e) { e.preventDefault(); }
        function drag(e) { e.dataTransfer.setData("text", e.target.id); }
        function drop(e, zone) {
            e.preventDefault();
            const id = e.dataTransfer.setData ? e.dataTransfer.getData("text") : ""; // Safari fix
            const item = document.getElementById(e.dataTransfer.getData("text"));
            const container = e.currentTarget.querySelector('.slot-container');
            if (item && container) {
                container.appendChild(item);
                const correct = (sortSubMode === 'free' || item.getAttribute('data-cat') === zone);
                const pop = document.createElement('div');
                pop.className = 'feedback-pop';
                pop.innerHTML = correct ? '⭐' : '❌';
                item.appendChild(pop);
                sounds[correct ? 'star' : 'wrong'].play();
                if(sortSubMode === 'ordered' && document.getElementById('shuffled-box').children.length === 0) {
                    confetti(); sounds.hooray.play();
                }
            }
        }

        // Divergent Timer Logic
        function startDivTimer() {
            timeLeft = duration;
            const bar = document.getElementById('pBar');
            const emoji = document.getElementById('tEmoji');
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                const percent = (timeLeft / duration) * 100;
                if(timerType === 'bomb') {
                    bar.style.width = percent + '%';
                    emoji.style.right = (100 - percent) + '%';
                } else {
                    bar.style.width = (100 - percent) + '%';
                    emoji.style.left = (100 - percent) + '%';
                }
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    (timerType === 'bomb') ? sounds.bomb.play() : sounds.hooray.play();
                    setTimeout(() => { currentView = 'SUMMARY'; updateView(); }, 1200);
                }
            }, 100);
        }

        function countStar() {
            starCount++;
            document.getElementById('lCounter').innerText = starCount;
            sounds.star.currentTime = 0; sounds.star.play();
        }

        function toggleScored(id) {
            const idx = scoredIds.indexOf(id);
            (idx > -1) ? scoredIds.splice(idx, 1) : scoredIds.push(id);
            updateView();
        }

        function handleSizeChange(v) { document.documentElement.style.setProperty('--card-width', v + 'px'); }
        function handleTextToggle(v) { updateView(); }

        async function exportResult() {
            const target = document.getElementById('export-target') || document.getElementById('app');
            const canvas = await html2canvas(target, { scale: 2, useCORS: true, scrollY: -window.scrollY });
            const link = document.createElement('a');
            link.download = '練習結果.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        updateView();
    </script>
</body>
</html>
